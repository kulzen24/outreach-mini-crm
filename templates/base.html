<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Radio Outreach{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="{{ url_for('index') }}" class="nav-brand">📻 Radio Outreach</a>
    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Checklist</a>
      <a href="{{ url_for('settings') }}" class="{% if request.endpoint == 'settings' %}active{% endif %}">Settings</a>
      <a href="{{ url_for('download') }}">Download .xlsx</a>
    </div>
  </div>
</nav>

<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert--{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
